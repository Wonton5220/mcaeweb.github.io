    <style>
        :root {
            --bg-body: #1e1f2c;
            --bg-container: #252836;
            --bg-panel: #2f3342;
            --bg-card: #1e212e;
            --border-color: #3a3f50;
            --text-primary: #eef4ff;
            --text-secondary: #9ca3c0;
            --btn-primary-bg: linear-gradient(135deg, #0f5f9e, #1e8bc3);
            --btn-primary-border: #2b8fc9;
            --btn-secondary-bg: #3b4055;
            --canvas-bg: repeating-conic-gradient(#2f3545 0% 25%, #222736 0% 50%);
            --empty-bg: #1a1e2a;
            --checker-color1: #2f3545;
            --checker-color2: #222736;
        }
        body.light {
            --bg-body: #f5efe7;
            --bg-container: #ffffff;
            --bg-panel: #f8f4ed;
            --bg-card: #ffffff;
            --border-color: #e2dcd2;
            --text-primary: #2c2b28;
            --text-secondary: #6b6258;
            --btn-primary-bg: linear-gradient(135deg, #a259ff, #6b3fe0);
            --btn-primary-border: #b87cff;
            --btn-secondary-bg: #eae2d4;
            --canvas-bg: repeating-conic-gradient(#e0d8cd 0% 25%, #f0ece4 0% 50%);
            --empty-bg: #fcf9f5;
            --checker-color1: #e0d8cd;
            --checker-color2: #f0ece4;
        }
        * { box-sizing: border-box; user-select: none; transition: background 0.2s ease, border 0.2s ease, color 0.1s ease; }
        body {
            background: var(--bg-body);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-primary);
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 18px 24px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }
        .tool-group {
            display: flex;
            gap: 8px;
            background: var(--bg-card);
            padding: 6px 14px;
            border-radius: 48px;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        button, .file-label {
            background: var(--btn-secondary-bg);
            border: 2px solid transparent;
            color: var(--text-primary);
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .circle-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
            font-size: 20px;
            background: var(--btn-primary-bg);
            border: 1px solid var(--btn-primary-border);
        }
        .primary-btn {
            background: var(--btn-primary-bg);
            border-color: var(--btn-primary-border);
            color: white;
            text-shadow: 0 1px 0 rgba(0,0,0,0.1);
        }
        .primary-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
        .danger-btn { background: #b13e3e; border-color: #cf5a5a; color: white; }
        .danger-btn:hover { background: #d14545; }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .slider-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            background: var(--bg-card);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
        }
        input[type="range"] { width: 120px; cursor: pointer; background: var(--border-color); height: 3px; border-radius: 3px; }
        input[type="number"] { background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 20px; padding: 5px 12px; width: 75px; text-align: center; }
        .main-layout { display: flex; flex-wrap: wrap; gap: 0; }
        .frames-panel {
            width: 360px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .frames-header {
            padding: 16px 20px;
            background: var(--bg-card);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .collapse-btn {
            background: var(--btn-secondary-bg);
            border: none;
            border-radius: 32px;
            width: 32px;
            height: 32px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            color: var(--text-primary);
            padding: 0;
        }
        .collapse-btn.collapsed { transform: rotate(180deg); }
        .frames-list-container { transition: all 0.2s ease; overflow-y: auto; }
        .frames-list-container.collapsed { display: none; }
        .frames-list { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .frame-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            gap: 14px;
            align-items: center;
            border: 1px solid var(--border-color);
            cursor: grab;
        }
        .frame-card:active { cursor: grabbing; }
        .frame-thumb {
            width: 64px;
            height: 64px;
            background: var(--bg-body);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .frame-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: crisp-edges; image-rendering: pixelated; }
        .frame-info { flex: 1; }
        .frame-index { font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
        .delay-control { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .delay-control input { width: 70px; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 40px; padding: 5px 8px; color: var(--text-primary); font-size: 12px; }
        .del-frame { background: none; color: #e06c75; font-size: 20px; padding: 5px 8px; box-shadow: none; border: none; }
        .del-frame:hover { background: #3a2a2e; transform: none; color: #ff8a9a; }
        .preview-panel { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 20px; background: var(--bg-container); }
        .canvas-area {
            background: var(--bg-panel);
            border-radius: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            box-shadow: inset 0 0 0 1px var(--border-color), 0 10px 20px -5px rgba(0,0,0,0.2);
        }
        canvas {
            background: transparent; /* 不再使用纯色背景，改为绘制棋盘格 */
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px black;
            max-width: 100%;
            height: auto;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        .preview-controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .status-badge { background: var(--bg-card); padding: 6px 16px; border-radius: 50px; font-family: monospace; font-size: 14px; border: 1px solid var(--border-color); }
        .empty-placeholder { text-align: center; color: var(--text-secondary); padding: 40px; background: var(--empty-bg); border-radius: 28px; }
        .badge-icon { background: var(--btn-primary-bg); padding: 2px 10px; border-radius: 50px; font-size: 12px; color: white; }
        footer { background: var(--bg-panel); padding: 12px 24px; text-align: center; font-size: 12px; color: var(--text-secondary); border-top: 1px solid var(--border-color); }
        .success-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c6e2c;
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            z-index: 1000;
            font-size: 14px;
            box-shadow: 0 4px 12px black;
            animation: fadeout 2s forwards;
        }
        @keyframes fadeout { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @media (max-width: 780px) { .frames-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="toolbar">
        <div class="tool-group">
            <button id="addFrameBtn">+ 添加帧</button>
            <button id="removeAllBtn" class="danger-btn">✕ 清空所有</button>
            <button id="themeToggleBtn" class="circle-btn">☼</button>
            <button id="langToggleBtn" class="circle-btn">🌏</button>
        </div>
        <div class="tool-group">
            <button id="uploadMcMetaBtn" style="background:#564c9c;">[M] 上传.mcmeta</button>
            <label class="checkbox-label" id="iconModeLabel">
                <input type="checkbox" id="mcIconModeCheckbox"> <span id="iconModeText">[图标模式] 百科双尺寸</span>
            </label>
        </div>
        <div class="tool-group">
            <button id="playBtn">▶ 播放</button>
            <button id="stopBtn">■ 停止</button>
            <button id="exportGifBtn" class="primary-btn">↓ 导出GIF</button>
        </div>
        <div class="tool-group">
            <div class="slider-label"><span id="zoomLabel">[缩放]</span><input type="range" id="zoomSlider" min="30" max="200" value="100"><span id="zoomVal">100%</span></div>
            <div class="slider-label"><span id="delayLabel">[延迟]</span><input type="number" id="globalDelay" value="100" step="10"><button id="applyGlobalDelay" style="padding:4px 12px;">应用</button></div>
        </div>
        <div class="tool-group">
            <label class="file-label" id="batchLabel" style="background:var(--btn-secondary-bg);">
                [文件夹] 批量导入图片
                <input type="file" id="batchFilesInput" multiple accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">
            </label>
        </div>
    </div>
    <div class="main-layout">
        <div class="frames-panel">
            <div class="frames-header">
                <span id="framesHeaderLabel">帧序列 (拖拽排序 · 自动裁切)</span>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span class="badge-icon" id="frameCountBadge">0 帧</span>
                    <button id="collapseFramesBtn" class="collapse-btn" title="折叠/展开帧列表">^</button>
                </div>
            </div>
            <div id="framesListContainer" class="frames-list-container">
                <div class="frames-list" id="framesListInner">
                    <div class="empty-placeholder" id="emptyPlaceholderText">✨ 上传图片自动切正方形序列帧<br>支持 .mcmeta 配置每帧延迟</div>
                </div>
            </div>
        </div>
        <div class="preview-panel">
            <div class="canvas-area">
                <canvas id="previewCanvas" width="480" height="480" style="width:100%; max-width:480px; aspect-ratio:1/1"></canvas>
            </div>
            <div class="preview-controls">
                <div class="status-badge" id="playStatus">■ 停止</div>
                <div class="status-badge"><span id="frameLabel">帧</span> <span id="currentFrameIdx">0</span> / <span id="totalFramesSpan">0</span></div>
            </div>
        </div>
    </div>
    <footer id="footerText">自动裁切: 上传图片按宽度切正方形序列 | 折叠面板 | 硬边缘预览 | 昼夜模式 | 中英文切换</footer>
</div>
<script>
    // ========== 全局变量 ==========
    let frames = [];
    const STD_WIDTH = 480, STD_HEIGHT = 480;
    let currentPreviewFrame = 0;
    let isPlaying = false;
    let lastFrameTime = 0;
    let animFrameId = null;
    let isFramesCollapsed = false;
    let currentLang = 'zh';   // 默认中文
    let gifWorkerBlobUrl = null;

    // ========== 翻译字典 ==========
    const translations = {
        zh: {
            addFrame: "+ 添加帧", clearAll: "✕ 清空所有", uploadMcMeta: "[M] 上传.mcmeta",
            iconMode: "[图标模式] 百科双尺寸", play: "▶ 播放", stop: "■ 停止", exportGif: "↓ 导出GIF",
            zoom: "[缩放]", delay: "[延迟]", apply: "应用", batch: "[文件夹] 批量导入图片",
            framesHeader: "帧序列 (拖拽排序 · 自动裁切)", emptyPlaceholder: "✨ 上传图片自动切正方形序列帧<br>支持 .mcmeta 配置每帧延迟",
            frameLabel: "帧", stopped: "■ 停止", playing: "▶ 播放中", frameCount: "帧", ms: "ms",
            toastAdded: "✓ 已添加 {count} 个序列帧 (自动裁切)", toastMcmeta: "✓ 已应用 .mcmeta 延迟配置",
            toastNormal: "普通GIF导出完成", toastDual: "✓ 双尺寸GIF已导出", toastGenerating: "生成双尺寸...",
            alertNoFrames: "无帧可导出", alertAddFrames: "请先添加图片帧",
            alertInvalidMcmeta: "未识别的mcmeta结构", alertNoDelay: "mcmeta中无有效帧时间", alertParseError: "解析.mcmeta失败: ",
            alertNoFrameExport: "无帧可导出", alertExportFail: "导出失败: ", footer: "自动裁切: 上传图片按宽度切正方形序列 | 折叠面板 | 硬边缘预览 | 昼夜模式 | 中英文切换",
            collapseTitle: "折叠/展开帧列表"
        },
        en: {
            addFrame: "+ Add Frame", clearAll: "✕ Clear All", uploadMcMeta: "[M] Upload .mcmeta",
            iconMode: "[Icon Mode] Wiki Dual Size", play: "▶ Play", stop: "■ Stop", exportGif: "↓ Export GIF",
            zoom: "[Zoom]", delay: "[Delay]", apply: "Apply", batch: "[Folder] Batch Import",
            framesHeader: "Frame Sequence (Drag to sort · Auto crop)", emptyPlaceholder: "✨ Upload image to auto-crop square frames<br>Supports .mcmeta frame delay config",
            frameLabel: "Frame", stopped: "■ Stopped", playing: "▶ Playing", frameCount: "frames", ms: "ms",
            toastAdded: "✓ Added {count} sequence frames (auto crop)", toastMcmeta: "✓ Applied .mcmeta delay config",
            toastNormal: "Normal GIF exported", toastDual: "✓ Dual-size GIFs exported", toastGenerating: "Generating dual-size...",
            alertNoFrames: "No frames to export", alertAddFrames: "Please add image frames first",
            alertInvalidMcmeta: "Unrecognized mcmeta structure", alertNoDelay: "No valid frame delay in mcmeta", alertParseError: "Parse .mcmeta failed: ",
            alertNoFrameExport: "No frames to export", alertExportFail: "Export failed: ", footer: "Auto crop: image width splits into square frames | Collapsible panel | Hard-edge preview | Day/Night & EN/CN",
            collapseTitle: "Collapse/Expand frame list"
        }
    };
    function t(key, params = {}) {
        let text = translations[currentLang]?.[key] || translations['en'][key] || key;
        if (params.count !== undefined) text = text.replace('{count}', params.count);
        return text;
    }

    // ========== 语言切换核心 ==========
    function applyLanguage() {
        // 更新所有静态元素
        document.querySelector('#addFrameBtn').innerText = t('addFrame');
        document.querySelector('#removeAllBtn').innerHTML = t('clearAll');
        document.querySelector('#uploadMcMetaBtn').innerHTML = t('uploadMcMeta');
        document.querySelector('#iconModeText').innerText = t('iconMode');
        document.querySelector('#playBtn').innerText = t('play');
        document.querySelector('#stopBtn').innerText = t('stop');
        document.querySelector('#exportGifBtn').innerHTML = t('exportGif');
        document.querySelector('#zoomLabel').innerHTML = t('zoom');
        document.querySelector('#delayLabel').innerHTML = t('delay');
        document.querySelector('#applyGlobalDelay').innerText = t('apply');
        // 批量导入标签
        const batchLabel = document.querySelector('#batchLabel');
        if (batchLabel) {
            const inputElem = batchLabel.querySelector('input');
            batchLabel.innerHTML = t('batch') + ' ';
            if (inputElem) batchLabel.appendChild(inputElem);
        }
        document.querySelector('#framesHeaderLabel').innerText = t('framesHeader');
        document.querySelector('#emptyPlaceholderText').innerHTML = t('emptyPlaceholder');
        document.querySelector('#frameLabel').innerText = t('frameLabel');
        document.querySelector('#footerText').innerText = t('footer');
        document.querySelector('#collapseFramesBtn').title = t('collapseTitle');
        // 播放状态
        document.querySelector('#playStatus').innerHTML = isPlaying ? t('playing') : t('stopped');
        // 地球图标
        document.querySelector('#langToggleBtn').innerText = currentLang === 'zh' ? '🌏' : '🌎';
        // 帧计数
        updateFrameCountText();
        // 重新渲染帧列表（更新ms单位）
        renderFrameList();
    }

    function updateFrameCountText() {
        const badge = document.querySelector('#frameCountBadge');
        if (badge) badge.innerHTML = frames.length + ' ' + t('frameCount');
        const totalSpan = document.querySelector('#totalFramesSpan');
        if (totalSpan) totalSpan.innerText = frames.length;
        if (frames.length === 0) {
            if (document.querySelector('#currentFrameIdx')) document.querySelector('#currentFrameIdx').innerText = '0';
        } else {
            if (document.querySelector('#currentFrameIdx')) document.querySelector('#currentFrameIdx').innerText = (currentPreviewFrame % frames.length) + 1;
        }
    }

    async function setLang(lang) {
        if (lang === currentLang) return;
        currentLang = lang;
        localStorage.setItem('mcae_lang', lang);
        applyLanguage(); // 同步刷新所有文字
    }

    function toggleLang() {
        setLang(currentLang === 'zh' ? 'en' : 'zh');
    }

    // ========== 主题 ==========
    function setTheme(theme) {
        if (theme === 'light') document.body.classList.add('light');
        else document.body.classList.remove('light');
        localStorage.setItem('mcae_theme', theme);
    }
    function toggleTheme() {
        const isLight = document.body.classList.contains('light');
        setTheme(isLight ? 'dark' : 'light');
        document.getElementById('themeToggleBtn').innerText = isLight ? '☼' : '☽';
        if (!isPlaying && frames.length) drawPreviewFrame(currentPreviewFrame);
    }

    // ========== 图像处理 ==========
    function cropImageIntoSquares(imgElement) {
        return new Promise((resolve) => {
            const imgWidth = imgElement.width, imgHeight = imgElement.height;
            const squareSize = imgWidth;
            if (squareSize <= 0) return resolve([]);
            const rows = Math.floor(imgHeight / squareSize);
            if (rows === 0) {
                const canvas = document.createElement('canvas');
                canvas.width = squareSize; canvas.height = squareSize;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(imgElement, 0, 0, squareSize, squareSize, 0, 0, squareSize, squareSize);
                return resolve([canvas]);
            }
            const squares = [];
            for (let row = 0; row < rows; row++) {
                const canvas = document.createElement('canvas');
                canvas.width = squareSize; canvas.height = squareSize;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(imgElement, 0, row * squareSize, squareSize, squareSize, 0, 0, squareSize, squareSize);
                squares.push(canvas);
            }
            resolve(squares);
        });
    }

    function normalizeCanvasToStd(canvasSquare) {
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = STD_WIDTH; finalCanvas.height = STD_HEIGHT;
        const ctx = finalCanvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, STD_WIDTH, STD_HEIGHT); // 透明背景
        const scale = Math.min(STD_WIDTH / canvasSquare.width, STD_HEIGHT / canvasSquare.height);
        const dw = canvasSquare.width * scale, dh = canvasSquare.height * scale;
        ctx.drawImage(canvasSquare, (STD_WIDTH - dw) / 2, (STD_HEIGHT - dh) / 2, dw, dh);
        return finalCanvas;
    }

    async function createFramesFromImageFile(file, baseDelayMs) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    try {
                        const squares = await cropImageIntoSquares(img);
                        if (squares.length === 0) { reject(new Error('Cannot crop squares')); return; }
                        const framesObjs = squares.map(sq => ({
                            imgElement: img, delayMs: baseDelayMs,
                            imgDataURL: normalizeCanvasToStd(sq).toDataURL('image/png'),
                            normalizedCanvas: normalizeCanvasToStd(sq),
                            rawCanvas: sq
                        }));
                        resolve(framesObjs);
                    } catch (err) { reject(err); }
                };
                img.onerror = () => reject(new Error('Image load failed'));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error('File read failed'));
            reader.readAsDataURL(file);
        });
    }

    async function addFramesFromFiles(files, delayOverride = null) {
        if (!files.length) return;
        const baseDelay = delayOverride !== null ? delayOverride : parseInt(document.getElementById('globalDelay').value);
        let added = 0;
        for (let file of files) {
            if (!file.type.startsWith('image/')) continue;
            try {
                const newFrames = await createFramesFromImageFile(file, baseDelay);
                frames.push(...newFrames);
                added += newFrames.length;
            } catch (err) { console.warn(err); }
        }
        if (added) {
            await renderFrameList();
            if (!isPlaying && frames.length) drawPreviewFrame(frames.length - 1);
            if (isPlaying) restartPreview();
            showToast(t('toastAdded', { count: added }));
        }
    }

    // ========== 帧列表渲染 ==========
    async function renderFrameList() {
        const container = document.getElementById('framesListInner');
        if (!container) return;
        if (frames.length === 0) {
            container.innerHTML = `<div class="empty-placeholder">${t('emptyPlaceholder')}</div>`;
            updateFrameCountText();
            drawPreviewFrame(0);
            return;
        }
        let html = '';
        frames.forEach((frame, idx) => {
            html += `
                <div class="frame-card" data-index="${idx}">
                    <div class="frame-thumb"><img src="${frame.normalizedCanvas.toDataURL()}" alt="frame ${idx+1}"></div>
                    <div class="frame-info">
                        <div class="frame-index">#${idx+1}</div>
                        <div class="delay-control">
                            <input type="number" class="frame-delay-input" data-idx="${idx}" value="${frame.delayMs}" step="10" min="10" max="5000">
                            <span>${t('ms')}</span>
                            <button class="del-frame" data-idx="${idx}">✖</button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        // 事件绑定
        document.querySelectorAll('.frame-delay-input').forEach(inp => {
            inp.addEventListener('change', (e) => {
                const idx = parseInt(inp.dataset.idx);
                if (!isNaN(idx) && frames[idx]) {
                    let val = parseInt(inp.value);
                    if (isNaN(val)) val = 100;
                    val = Math.min(5000, Math.max(10, val));
                    frames[idx].delayMs = val;
                    inp.value = val;
                    if (!isPlaying) drawPreviewFrame(currentPreviewFrame % frames.length);
                }
            });
        });
        document.querySelectorAll('.del-frame').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                if (!isNaN(idx) && frames[idx]) removeFrameAtIndex(idx);
                e.stopPropagation();
            });
        });
        if (window.frameSortable) window.frameSortable.destroy();
        window.frameSortable = new Sortable(container, {
            animation: 200, handle: '.frame-card',
            onEnd: async (evt) => {
                const oldIdx = evt.oldIndex, newIdx = evt.newIndex;
                if (oldIdx !== newIdx && frames.length) {
                    const moved = frames.splice(oldIdx, 1)[0];
                    frames.splice(newIdx, 0, moved);
                    await renderFrameList();
                    if (!isPlaying) drawPreviewFrame(currentPreviewFrame % frames.length);
                    else restartPreview();
                }
            }
        });
        updateFrameCountText();
        if (!isPlaying) drawPreviewFrame(currentPreviewFrame % frames.length);
    }

    function removeFrameAtIndex(idx) {
        if (idx < 0 || idx >= frames.length) return;
        frames.splice(idx, 1);
        if (frames.length === 0) { stopPlayback(); currentPreviewFrame = 0; ctx.clearRect(0,0,previewCanvas.width,previewCanvas.height); }
        else { if (currentPreviewFrame >= frames.length) currentPreviewFrame = frames.length-1; if(!isPlaying) drawPreviewFrame(currentPreviewFrame); }
        renderFrameList();
        if(isPlaying) restartPreview();
    }

    // ========== 预览绘制（带棋盘格背景） ==========
    function drawCheckerboard(ctx, w, h) {
        const c1 = getComputedStyle(document.body).getPropertyValue('--checker-color1').trim() || '#2f3545';
        const c2 = getComputedStyle(document.body).getPropertyValue('--checker-color2').trim() || '#222736';
        const size = 20;
        for (let y = 0; y < h; y += size) {
            for (let x = 0; x < w; x += size) {
                ctx.fillStyle = ((Math.floor(x/size) + Math.floor(y/size)) % 2 === 0) ? c1 : c2;
                ctx.fillRect(x, y, size, size);
            }
        }
    }

    function drawPreviewFrame(idx) {
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = STD_WIDTH; canvas.height = STD_HEIGHT;
        // 绘制棋盘格背景
        drawCheckerboard(ctx, STD_WIDTH, STD_HEIGHT);
        if (!frames.length) {
            document.getElementById('currentFrameIdx').innerText = '0';
            return;
        }
        const safeIdx = ((idx % frames.length) + frames.length) % frames.length;
        const frame = frames[safeIdx];
        currentPreviewFrame = safeIdx;
        document.getElementById('currentFrameIdx').innerText = (safeIdx+1).toString();
        if (frame?.normalizedCanvas) {
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(frame.normalizedCanvas, 0, 0, STD_WIDTH, STD_HEIGHT);
            const zoom = parseInt(document.getElementById('zoomSlider').value)/100;
            canvas.style.transform = `scale(${zoom})`;
            canvas.style.transformOrigin = 'center center';
        }
    }

    // ========== 播放控制 ==========
    function startPlayback() {
        if (frames.length === 0) return;
        if (isPlaying) stopPlayback();
        isPlaying = true;
        document.getElementById('playStatus').innerHTML = t('playing');
        lastFrameTime = performance.now();
        function step(now) {
            if (!isPlaying) return;
            if (frames.length === 0) { stopPlayback(); return; }
            const delay = frames[currentPreviewFrame]?.delayMs || 100;
            if (now - lastFrameTime >= delay) {
                currentPreviewFrame = (currentPreviewFrame + 1) % frames.length;
                drawPreviewFrame(currentPreviewFrame);
                lastFrameTime = now;
            }
            animFrameId = requestAnimationFrame(step);
        }
        if (animFrameId) cancelAnimationFrame(animFrameId);
        animFrameId = requestAnimationFrame(step);
    }
    function stopPlayback() {
        isPlaying = false;
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
        document.getElementById('playStatus').innerHTML = t('stopped');
        if (frames.length) drawPreviewFrame(currentPreviewFrame);
    }
    function restartPreview() { if(isPlaying){ stopPlayback(); startPlayback(); } }
    async function clearAllFrames() { stopPlayback(); frames = []; currentPreviewFrame = 0; await renderFrameList(); drawPreviewFrame(0); }
    function applyGlobalDelayToAll() { const nd = parseInt(document.getElementById('globalDelay').value); if(isNaN(nd)) return; frames.forEach(f=>f.delayMs=nd); renderFrameList(); if(!isPlaying) drawPreviewFrame(currentPreviewFrame); }

    // ========== .mcmeta 解析 ==========
    function parseMcMetaAndApply(jsonContent) {
        try {
            let config = JSON.parse(jsonContent);
            let delays = [];
            let anim = config.animation || config;
            if (anim && Array.isArray(anim.frames)) {
                for (let f of anim.frames) {
                    if (typeof f === 'number') delays.push(f);
                    else if (f && typeof f.time === 'number') delays.push(f.time);
                    else if (f && typeof f.delay === 'number') delays.push(f.delay);
                    else delays.push(parseInt(document.getElementById('globalDelay').value));
                }
            } else if (anim && typeof anim.frametime === 'number') {
                for (let i = 0; i < frames.length; i++) delays.push(anim.frametime);
            } else if (Array.isArray(anim)) {
                delays = anim.map(v => typeof v === 'number' ? v : (v.time || 100));
            } else { alert(t('alertInvalidMcmeta')); return false; }
            if (delays.length === 0) { alert(t('alertNoDelay')); return false; }
            for (let i = 0; i < frames.length && i < delays.length; i++) frames[i].delayMs = delays[i];
            renderFrameList();
            showToast(t('toastMcmeta'));
            return true;
        } catch (err) { alert(t('alertParseError') + err.message); return false; }
    }
    function uploadMcMetaFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.mcmeta,application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const text = await file.text();
            if (frames.length === 0) { alert(t('alertAddFrames')); return; }
            parseMcMetaAndApply(text);
        };
        input.click();
    }

    // ========== 图标模式缩放（无黑边） ==========
    function resizeRawCanvasNearest(srcCanvas, targetWidth) {
        const canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = targetWidth;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, targetWidth, targetWidth); // 透明背景
        ctx.drawImage(srcCanvas, 0, 0, targetWidth, targetWidth);
        return canvas;
    }

    // ========== GIF 导出（修复透明） ==========
    async function getGifWorkerBlobUrl() {
        if (gifWorkerBlobUrl) return gifWorkerBlobUrl;
        try {
            const response = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
            const workerScript = await response.text();
            const blob = new Blob([workerScript], { type: 'application/javascript' });
            gifWorkerBlobUrl = URL.createObjectURL(blob);
            return gifWorkerBlobUrl;
        } catch (err) {
            console.error('Fetch worker script failed:', err);
            throw new Error('无法加载GIF编码库，请检查网络连接');
        }
    }
    async function exportNormalGif() {
        if (frames.length === 0) throw new Error("No frames");
        const workerUrl = await getGifWorkerBlobUrl();
        if (typeof GIF === 'undefined') {
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        const gif = new GIF({ workers: 2, quality: 10, width: STD_WIDTH, height: STD_HEIGHT, workerScript: workerUrl });
        for (let i = 0; i < frames.length; i++) {
            const frameCanvas = frames[i].normalizedCanvas;
            // 复制画布以保留透明
            const copy = document.createElement('canvas');
            copy.width = frameCanvas.width; copy.height = frameCanvas.height;
            const ctx = copy.getContext('2d');
            ctx.clearRect(0, 0, copy.width, copy.height);
            ctx.drawImage(frameCanvas, 0, 0);
            gif.addFrame(copy, { delay: frames[i].delayMs, copy: true });
        }
        return new Promise((resolve, reject) => { gif.on('finished', resolve); gif.on('error', reject); gif.render(); });
    }
    async function exportIconGif(targetWidth) {
        if (frames.length === 0) throw new Error("No frames");
        const workerUrl = await getGifWorkerBlobUrl();
        if (typeof GIF === 'undefined') {
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        const gif = new GIF({ workers: 2, quality: 10, width: targetWidth, height: targetWidth, workerScript: workerUrl });
        for (let i = 0; i < frames.length; i++) {
            const scaledCanvas = resizeRawCanvasNearest(frames[i].rawCanvas, targetWidth);
            gif.addFrame(scaledCanvas, { delay: frames[i].delayMs, copy: true });
        }
        return new Promise((resolve, reject) => { gif.on('finished', resolve); gif.on('error', reject); gif.render(); });
    }
    async function exportMcIconGifs() {
        if (frames.length === 0) { alert(t('alertNoFrames')); return; }
        showToast(t('toastGenerating'));
        try {
            const blob32 = await exportIconGif(32);
            const blob128 = await exportIconGif(128);
            downloadBlob(blob32, `mc_icon_32px_${Date.now()}.gif`);
            downloadBlob(blob128, `mc_icon_128px_${Date.now()}.gif`);
            showToast(t('toastDual'));
        } catch(e) { alert(t('alertExportFail') + e.message); }
    }
    async function handleExport() {
        if (frames.length === 0) { alert(t('alertNoFrameExport')); return; }
        const exportBtn = document.getElementById('exportGifBtn');
        exportBtn.disabled = true;
        const originalText = exportBtn.textContent;
        exportBtn.textContent = document.getElementById('mcIconModeCheckbox').checked ? t('toastGenerating') : "生成中...";
        try {
            if (document.getElementById('mcIconModeCheckbox').checked) await exportMcIconGifs();
            else {
                const blob = await exportNormalGif();
                downloadBlob(blob, `mcae_animation_${Date.now()}.gif`);
                showToast(t('toastNormal'));
            }
        } catch(e) { alert(t('alertExportFail') + e.message); }
        finally { exportBtn.disabled = false; exportBtn.textContent = originalText; }
    }
    function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'success-toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    // ========== 初始化 ==========
    function initTheme() {
        const stored = localStorage.getItem('mcae_theme');
        if (stored === 'light') setTheme('light');
        else setTheme('dark');
        document.getElementById('themeToggleBtn').innerText = stored === 'light' ? '☽' : '☼';
    }
    function initLang() {
        const stored = localStorage.getItem('mcae_lang');
        if (stored === 'en') currentLang = 'en';
        else currentLang = 'zh';
        applyLanguage(); // 第一次应用语言
    }
    function initCollapseState() {
        const saved = localStorage.getItem('mcae_frames_collapsed');
        const framesOuter = document.getElementById('framesListContainer');
        const collapseBtn = document.getElementById('collapseFramesBtn');
        if (saved === 'true') {
            isFramesCollapsed = true;
            framesOuter.classList.add('collapsed');
            collapseBtn.classList.add('collapsed');
        } else {
            isFramesCollapsed = false;
            framesOuter.classList.remove('collapsed');
            collapseBtn.classList.remove('collapsed');
        }
    }
    function toggleFramesCollapse() {
        const framesOuter = document.getElementById('framesListContainer');
        const collapseBtn = document.getElementById('collapseFramesBtn');
        isFramesCollapsed = !isFramesCollapsed;
        if (isFramesCollapsed) {
            framesOuter.classList.add('collapsed');
            collapseBtn.classList.add('collapsed');
        } else {
            framesOuter.classList.remove('collapsed');
            collapseBtn.classList.remove('collapsed');
        }
        localStorage.setItem('mcae_frames_collapsed', isFramesCollapsed ? 'true' : 'false');
    }

    // ========== 绑定事件 ==========
    const addFrameBtn = document.getElementById('addFrameBtn');
    const removeAllBtn = document.getElementById('removeAllBtn');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportGifBtn = document.getElementById('exportGifBtn');
    const applyGlobalDelayBtn = document.getElementById('applyGlobalDelay');
    const uploadMcMetaBtn = document.getElementById('uploadMcMetaBtn');
    const batchFilesInput = document.getElementById('batchFilesInput');
    const globalDelayInput = document.getElementById('globalDelay');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomVal = document.getElementById('zoomVal');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const langToggleBtn = document.getElementById('langToggleBtn');
    const collapseFramesBtn = document.getElementById('collapseFramesBtn');
    const previewCanvas = document.getElementById('previewCanvas');
    const ctx = previewCanvas.getContext('2d');

    addFrameBtn.onclick = () => { const inp = document.createElement('input'); inp.type='file'; inp.multiple=true; inp.accept='image/*'; inp.onchange=async(e)=>{if(inp.files.length) await addFramesFromFiles(Array.from(inp.files));}; inp.click(); };
    removeAllBtn.onclick = clearAllFrames;
    playBtn.onclick = () => { if(frames.length) startPlayback(); else alert(t('alertAddFrames')); };
    stopBtn.onclick = stopPlayback;
    exportGifBtn.onclick = handleExport;
    applyGlobalDelayBtn.onclick = applyGlobalDelayToAll;
    uploadMcMetaBtn.onclick = uploadMcMetaFile;
    batchFilesInput.onchange = async (e) => { if(e.target.files.length) { await addFramesFromFiles(Array.from(e.target.files)); batchFilesInput.value=''; } };
    document.querySelector('#batchLabel').onclick = () => batchFilesInput.click();
    zoomSlider.oninput = (e) => { let v=e.target.value; zoomVal.innerText=v+'%'; let zoom=v/100; previewCanvas.style.transform=`scale(${zoom})`; if(!isPlaying && frames.length) drawPreviewFrame(currentPreviewFrame); };
    themeToggleBtn.onclick = toggleTheme;
    langToggleBtn.onclick = toggleLang;
    collapseFramesBtn.onclick = toggleFramesCollapse;
    document.body.addEventListener('dragover', e=>e.preventDefault());
    document.body.addEventListener('drop', async e=>{ e.preventDefault(); const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')); if(files.length) await addFramesFromFiles(files); });

    // ========== 启动 ==========
    async function init() {
        initTheme();
        initLang();      // 应用语言（默认中文）
        initCollapseState();
        ctx.imageSmoothingEnabled = false;
        await renderFrameList();
        drawPreviewFrame(0);
        previewCanvas.style.transform = 'scale(1)';
        zoomSlider.value = '100';
        zoomVal.innerText = '100%';
    }
    init();
</script>
</body>
