<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // 根据浏览器语言自动跳转，默认中文
        const lang = navigator.language || navigator.userLanguage;
        if (lang.toLowerCase().startsWith('zh')) {
            location.href = './zh.html';
        } else {
            location.href = './en.html';
        }
    </script>
</head>
<body>
    <p>Loading... <a href="./zh.html">中文</a> | <a href="./en.html">English</a></p>
</body>
</html>
